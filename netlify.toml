[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify serverless functions
[functions]
  directory = "netlify/functions"

# SPA fallback — all routes serve index.html (React Router handles routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
